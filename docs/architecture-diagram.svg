<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14"/>
      <stop offset="100%" stop-color="#0D1424"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.4)"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(59,130,246,0.7)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.05)"/>
  </pattern>
  <rect width="900" height="620" fill="url(#dots)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="16" font-weight="700">SupportCast — System Architecture</text>
  <text x="450" y="48" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Inter, sans-serif" font-size="10">AtomQuest Hackathon 1.0 | Grand Finale</text>

  <!-- ===== CLIENT LAYER ===== -->
  <rect x="30" y="70" width="840" height="130" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="50" y="90" fill="rgba(255,255,255,0.35)" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="1">CLIENT LAYER</text>

  <!-- Agent Browser -->
  <rect x="80" y="100" width="200" height="85" rx="10" fill="url(#glass)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="180" y="120" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="11" font-weight="600">Agent Browser</text>
  <text x="180" y="136" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, sans-serif" font-size="9">React SPA</text>
  <rect x="100" y="145" width="70" height="14" rx="4" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="135" y="155" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="8">mediasoup-client</text>
  <rect x="175" y="145" width="70" height="14" rx="4" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="210" y="155" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="8">Socket.io</text>
  <text x="180" y="175" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="8">WebRTC + RTCStats</text>

  <!-- Customer Browser -->
  <rect x="320" y="100" width="200" height="85" rx="10" fill="url(#glass)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="420" y="120" text-anchor="middle" fill="#34D399" font-family="Inter, sans-serif" font-size="11" font-weight="600">Customer Browser</text>
  <text x="420" y="136" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, sans-serif" font-size="9">React SPA (Guest)</text>
  <rect x="340" y="145" width="70" height="14" rx="4" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="375" y="155" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="8">mediasoup-client</text>
  <rect x="415" y="145" width="70" height="14" rx="4" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="450" y="155" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="8">Socket.io</text>
  <text x="420" y="175" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="8">WebRTC + RTCStats</text>

  <!-- Admin Browser -->
  <rect x="560" y="100" width="200" height="85" rx="10" fill="url(#glass)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="660" y="120" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="11" font-weight="600">Admin Browser</text>
  <text x="660" y="136" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, sans-serif" font-size="9">React SPA (Admin)</text>
  <rect x="580" y="145" width="70" height="14" rx="4" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="615" y="155" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="8">Supabase JS</text>
  <rect x="655" y="145" width="70" height="14" rx="4" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="690" y="155" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="8">recharts</text>
  <text x="660" y="175" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="8">REST API + WebSocket</text>

  <!-- Cloudflare CDN -->
  <rect x="80" y="215" width="680" height="30" rx="6" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="420" y="234" text-anchor="middle" fill="rgba(245,158,11,0.8)" font-family="Inter, sans-serif" font-size="10" font-weight="600">Cloudflare CDN / WAF / DDoS Protection</text>

  <!-- ===== NETWORK / MEDIA LAYER ===== -->
  <rect x="30" y="260" width="840" height="80" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="50" y="280" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="1">NETWORK / MEDIA LAYER</text>

  <!-- STUN/STUN -->
  <rect x="80" y="292" width="130" height="35" rx="8" fill="url(#glass)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="145" y="305" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, sans-serif" font-size="9" font-weight="600">STUN / TURN</text>
  <text x="145" y="318" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="8">coturn (optional)</text>

  <!-- Socket.io WebSocket -->
  <rect x="245" y="292" width="180" height="35" rx="8" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="335" y="305" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="9" font-weight="600">WebSocket (Socket.io)</text>
  <text x="335" y="318" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="8">Events, signaling, chat</text>

  <!-- WebRTC media -->
  <rect x="460" y="292" width="180" height="35" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
  <text x="550" y="305" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="9" font-weight="600">WebRTC Media (SRTP)</text>
  <text x="550" y="318" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="8">Audio (Opus) + Video (VP8)</text>

  <!-- HTTPS REST -->
  <rect x="675" y="292" width="165" height="35" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="757" y="305" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="Inter, sans-serif" font-size="9" font-weight="600">HTTPS REST API</text>
  <text x="757" y="318" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="8">Auth, sessions, admin</text>

  <!-- ===== BACKEND LAYER ===== -->
  <rect x="30" y="355" width="840" height="180" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="50" y="375" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="1">BACKEND — Render (Node.js)</text>

  <!-- Render badge -->
  <rect x="750" y="365" width="100" height="18" rx="6" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="800" y="377" text-anchor="middle" fill="#A78BFA" font-family="Inter, sans-serif" font-size="9">Node.js 20 + Docker</text>

  <!-- Express server -->
  <rect x="80" y="390" width="200" height="130" rx="10" fill="url(#glass)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="180" y="410" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter, sans-serif" font-size="11" font-weight="600">Express.js Server</text>

  <!-- Sub-modules -->
  <rect x="95" y="422" width="75" height="22" rx="5" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="132" y="437" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="9">Socket.io</text>

  <rect x="175" y="422" width="85" height="22" rx="5" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="217" y="437" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="9">mediasoup</text>

  <rect x="95" y="452" width="75" height="22" rx="5" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="132" y="467" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="9">FFmpeg</text>

  <rect x="175" y="452" width="85" height="22" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="217" y="467" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, sans-serif" font-size="9">JWT Auth</text>

  <rect x="95" y="482" width="165" height="22" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="177" y="497" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Inter, sans-serif" font-size="9">Winston + Helmet + Rate Limit</text>

  <!-- mediasoup Worker -->
  <rect x="310" y="390" width="190" height="130" rx="10" fill="url(#glass)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="405" y="410" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="11" font-weight="600">mediasoup SFU</text>

  <rect x="325" y="422" width="70" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="360" y="434" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="8">Worker</text>

  <rect x="400" y="422" width="85" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="442" y="434" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="8">Router (room)</text>

  <rect x="325" y="448" width="160" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="405" y="460" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="8">Send/Recv Transports</text>

  <rect x="325" y="474" width="70" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="360" y="486" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="8">Producers</text>

  <rect x="400" y="474" width="85" height="18" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="442" y="486" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="8">Consumers</text>

  <rect x="325" y="498" width="160" height="18" rx="4" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="405" y="510" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="8">PlainTransport (FFmpeg)</text>

  <!-- FFmpeg -->
  <rect x="530" y="390" width="160" height="60" rx="10" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <text x="610" y="410" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="11" font-weight="600">FFmpeg</text>
  <text x="610" y="426" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Inter, sans-serif" font-size="9">RTP → MP4 recording</text>
  <text x="610" y="440" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="8">VP8/Opus → H.264/AAC</text>

  <!-- Supabase Service -->
  <rect x="530" y="460" width="160" height="60" rx="10" fill="rgba(16,185,129,0.06)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
  <text x="610" y="480" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="11" font-weight="600">Supabase SDK</text>
  <text x="610" y="496" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Inter, sans-serif" font-size="9">Auth · Database · Storage</text>
  <text x="610" y="510" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="8">Realtime WebSocket</text>

  <!-- Metrics / Health -->
  <rect x="720" y="390" width="130" height="60" rx="10" fill="url(#glass)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="785" y="410" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, sans-serif" font-size="10" font-weight="600">Observability</text>
  <text x="785" y="427" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter, sans-serif" font-size="9">GET /health</text>
  <text x="785" y="441" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="Inter, sans-serif" font-size="9">GET /metrics</text>

  <!-- ===== SUPABASE LAYER ===== -->
  <rect x="30" y="550" width="840" height="60" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(16,185,129,0.12)" stroke-width="1"/>
  <text x="50" y="570" fill="rgba(255,255,255,0.3)" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="1">SUPABASE (PaaS)</text>

  <!-- Auth -->
  <rect x="100" y="578" width="120" height="24" rx="6" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="160" y="594" text-anchor="middle" fill="#10B981" font-family="Inter, sans-serif" font-size="10">Auth (JWT)</text>

  <!-- Database -->
  <rect x="250" y="578" width="130" height="24" rx="6" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="315" y="594" text-anchor="middle" fill="#60A5FA" font-family="Inter, sans-serif" font-size="10">PostgreSQL + RLS</text>

  <!-- Storage -->
  <rect x="410" y="578" width="140" height="24" rx="6" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="480" y="594" text-anchor="middle" fill="#FBBF24" font-family="Inter, sans-serif" font-size="10">Storage (recordings)</text>

  <!-- Realtime -->
  <rect x="580" y="578" width="130" height="24" rx="6" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="645" y="594" text-anchor="middle" fill="#A78BFA" font-family="Inter, sans-serif" font-size="10">Realtime</text>

  <!-- Edge Functions -->
  <rect x="740" y="578" width="115" height="24" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="797" y="594" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, sans-serif" font-size="10">Edge Funcs</text>

  <!-- ===== CONNECTION LINES ===== -->
  <!-- Agent to Cloudflare -->
  <line x1="180" y1="185" x2="180" y2="215" stroke="rgba(59,130,246,0.4)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Customer to Cloudflare -->
  <line x1="420" y1="185" x2="420" y2="215" stroke="rgba(16,185,129,0.4)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Admin to Cloudflare -->
  <line x1="660" y1="185" x2="660" y2="215" stroke="rgba(245,158,11,0.4)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cloudflare to STUN -->
  <line x1="145" y1="245" x2="145" y2="292" stroke="rgba(255,255,255,0.2)" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Cloudflare to Socket.io -->
  <line x1="335" y1="245" x2="335" y2="292" stroke="rgba(16,185,129,0.4)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Cloudflare to WebRTC -->
  <line x1="550" y1="245" x2="550" y2="292" stroke="rgba(59,130,246,0.4)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Cloudflare to REST -->
  <line x1="757" y1="245" x2="757" y2="292" stroke="rgba(255,255,255,0.2)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- STUN to mediasoup -->
  <line x1="145" y1="327" x2="310" y2="455" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- STUN to mediasoup direct -->
  <line x1="210" y1="310" x2="310" y2="420" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Network layer to Express -->
  <line x1="335" y1="327" x2="180" y2="390" stroke="rgba(16,185,129,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="327" x2="350" y2="455" stroke="rgba(59,130,246,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="757" y1="327" x2="180" y2="390" stroke="rgba(255,255,255,0.15)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Express to mediasoup -->
  <line x1="280" y1="455" x2="310" y2="455" stroke="rgba(59,130,246,0.3)" stroke-width="1" marker-end="url(#arrowBlue)"/>

  <!-- FFmpeg to PlainTransport -->
  <line x1="530" y1="420" x2="485" y2="492" stroke="rgba(245,158,11,0.4)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Express to Supabase SDK -->
  <line x1="280" y1="455" x2="530" y2="490" stroke="rgba(16,185,129,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="490" x2="530" y2="540" stroke="rgba(16,185,129,0.25)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Supabase to Auth -->
  <line x1="160" y1="565" x2="160" y2="578" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <!-- Supabase to DB -->
  <line x1="315" y1="565" x2="315" y2="578" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <!-- Supabase to Storage -->
  <line x1="480" y1="565" x2="480" y2="578" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <!-- Supabase to Realtime -->
  <line x1="645" y1="565" x2="645" y2="578" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
</svg>